[SERVER]
host = "localhost"
port = "8080"

[DATABASE]
# Options: "sqlite", "postgres", "mysql"
driver = "sqlite"

# SQLite configuration (used when driver = "sqlite")
path = "./sustainwear.db"

# PostgreSQL/MySQL configuration (used when driver = "postgres" or "mysql")
host = "localhost"
port = "5432"
user = "postgres"
password = "password"
dbname = "sustainwear"
sslmode = "disable"  # postgres only: "disable", "require", "verify-full"

[SECURITY]
jwt_secret = "secret-key"
jwt_expiry_hours = 24

